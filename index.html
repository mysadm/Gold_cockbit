<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gold Hedge Cockpit · غرفة عمليات الذهب</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Cairo:wght@400;600;800&display=swap');

:root{
  --bg:#141110; --panel:#1D1916; --line:#2E2822;
  --bone:#EAE2D4; --ash:#8B8272; --gold:#C9A227; --goldsoft:#E3C566;
  --green:#4E8F7B; --red:#B4482E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html[lang=ar] body{font-family:'Cairo',sans-serif;}
html[lang=en] body{font-family:'IBM Plex Mono',ui-monospace,monospace;}
body{background:var(--bg);color:var(--bone);display:flex;justify-content:center;min-height:100vh;}
.wrap{width:100%;max-width:520px;padding:36px 22px 70px;}
.num{font-family:'IBM Plex Mono',monospace;direction:ltr;unicode-bidi:embed;}
.serif{font-family:'Fraunces',Georgia,serif;}

.eyebrow{font-size:11px;letter-spacing:.15em;color:var(--ash);font-weight:600;}
h1{font-weight:800;font-size:27px;margin-top:6px;}
html[lang=en] h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:29px;}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.langbtn{background:var(--panel);border:1px solid var(--gold);color:var(--gold);
  font-family:'Cairo',sans-serif;font-weight:600;font-size:13px;padding:8px 16px;cursor:pointer;flex-shrink:0;}

.panel{background:var(--panel);border:1px solid var(--line);padding:18px 20px;margin-top:26px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.lbl{font-size:11px;color:var(--ash);margin-bottom:6px;font-weight:600;letter-spacing:.05em;}
input[type=number]{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);
  color:var(--bone);font-family:'IBM Plex Mono',monospace;font-size:15px;padding:2px 0;outline:none;
  text-align:left;direction:ltr;-moz-appearance:textfield;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}

.board{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);
  border-top:1px solid var(--line);margin-top:14px;}
.cell{background:var(--panel);padding:12px 14px;}
.cell .k{font-size:11px;color:var(--ash);font-weight:600;}
.cell .v{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--goldsoft);direction:ltr;margin-top:3px;}
.cell .u{font-size:10px;color:var(--ash);}
.cell.hero{grid-column:1/-1;background:#211B12;}
.cell.hero .v{font-size:21px;color:var(--gold);}

.pullrow{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);
  padding-top:12px;margin-top:12px;gap:12px;}
button.pull{background:#211B12;border:1px solid var(--gold);color:var(--gold);font-family:inherit;
  font-weight:600;font-size:13px;padding:9px 16px;cursor:pointer;}
button.pull:disabled{opacity:.5;cursor:wait;}
#stamp{font-size:11px;color:var(--ash);text-align:left;max-width:52%;line-height:1.5;direction:ltr;}
#stamp.err{color:var(--red);}
#stamp.ok{color:var(--green);}
#diag{display:none;direction:ltr;text-align:left;font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--red);line-height:1.9;border-top:1px dashed var(--line);
  padding-top:10px;margin-top:12px;white-space:pre-wrap;}

.calcrow{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ash);margin-bottom:14px;flex-wrap:wrap;}
.calcrow input{width:120px;}
table.karat{width:100%;border-collapse:collapse;}
table.karat th{font-size:11px;color:var(--ash);font-weight:600;text-align:start;
  padding:8px 6px;border-bottom:1px solid var(--line);}
table.karat th.n, table.karat td.n{text-align:end;}
table.karat td{padding:11px 6px;border-bottom:1px solid var(--line);font-size:14px;}
table.karat td.n{font-family:'IBM Plex Mono',monospace;direction:ltr;color:var(--bone);font-size:13px;}
table.karat tr.hl td{color:var(--gold);}
table.karat td .badge{font-size:10px;color:var(--ash);}

.target{text-align:center;margin-top:40px;}
.bignum{font-family:'Fraunces',Georgia,serif;font-weight:300;font-size:68px;line-height:1.05;margin-top:8px;direction:ltr;}
#delta{font-size:14px;margin-top:6px;}
#bandnote{font-size:13px;color:var(--ash);margin-top:10px;line-height:1.8;}

.scen{border-inline-start:3px solid;margin-top:22px;}
.scen .top{display:flex;justify-content:space-between;align-items:baseline;}
.scen .name{font-weight:800;font-size:17px;}
html[lang=en] .scen .name{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:18px;}
.scen .name .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ash);
  margin-inline-start:10px;direction:ltr;unicode-bidi:embed;}
html[lang=ar] .scen .name .sub{font-family:'IBM Plex Mono',monospace;}
html[lang=en] .scen .name .sub{font-family:'Cairo',sans-serif;font-size:12px;}
.scen .w{font-family:'IBM Plex Mono',monospace;font-size:22px;direction:ltr;}
.scen .thesis{font-size:12px;color:var(--ash);margin:6px 0 12px;line-height:1.7;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--line);
  outline:none;border:none;padding:0;direction:ltr;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:var(--bg);border:2px solid var(--gold);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
  background:var(--bg);border:2px solid var(--gold);cursor:pointer;}

.sechead{display:flex;justify-content:space-between;align-items:baseline;margin:44px 0 14px;flex-wrap:wrap;gap:8px;}
.sechead .lbl{margin:0;font-size:13px;font-weight:800;color:var(--bone);letter-spacing:.08em;}
.budget{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ash);}
.budget input{width:96px;}

.tranche{display:flex;align-items:center;gap:16px;padding:16px 18px;margin-bottom:10px;
  background:var(--panel);border:1px solid var(--line);}
.tranche.active{background:#211B12;border-color:var(--gold);}
.tranche.done{opacity:.65;}
.tpct{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:26px;width:58px;direction:ltr;text-align:center;}
.tranche.active .tpct{color:var(--gold);}
.tmid{flex:1;}
.tmid .row1{font-size:14px;font-weight:600;}
.tmid .row2{font-size:12px;color:var(--ash);margin-top:3px;}
.tright{text-align:end;font-size:12px;color:var(--ash);direction:ltr;font-family:'IBM Plex Mono',monospace;}
.tright .amt{color:var(--goldsoft);}
.posline{font-size:13px;color:var(--ash);padding:10px 18px;border-top:1px solid var(--line);}
.posline b{color:var(--goldsoft);font-weight:600;}

.chips{display:flex;flex-wrap:wrap;gap:10px;}
.chip{background:var(--panel);border:1px solid var(--line);padding:10px 14px;cursor:pointer;
  display:flex;align-items:center;gap:9px;font-family:inherit;color:var(--bone);font-size:13px;font-weight:600;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chip .st{font-size:11px;color:var(--ash);font-weight:400;}

details{margin-top:12px;border:1px dashed var(--line);}
summary{cursor:pointer;list-style:none;padding:10px 14px;font-size:12px;color:var(--gold);
  display:flex;align-items:center;gap:8px;user-select:none;font-weight:600;}
summary::-webkit-details-marker{display:none;}
summary::before{content:"؟";display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border:1px solid var(--gold);border-radius:50%;font-size:11px;flex-shrink:0;}
html[lang=en] summary::before{content:"?";}
details[open] summary{border-bottom:1px dashed var(--line);}
.exp{padding:12px 16px;font-size:13px;color:var(--ash);line-height:2;}
.exp b{color:var(--bone);font-weight:600;}
.exp .term{font-family:'IBM Plex Mono',monospace;color:var(--goldsoft);direction:ltr;unicode-bidi:embed;font-size:12px;}

.foot{margin-top:44px;font-size:11px;color:var(--ash);line-height:2;border-top:1px solid var(--line);padding-top:16px;}
.gcheck{color:var(--green);}

/* AI Analyst */
.ai-panel{border:1px solid var(--gold);background:#1A150E;}
.ai-keyrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.ai-keyrow input[type=password]{flex:1;min-width:180px;background:transparent;border:none;
  border-bottom:1px solid var(--line);color:var(--bone);font-family:'IBM Plex Mono',monospace;
  font-size:13px;padding:4px 0;outline:none;direction:ltr;}
.ai-keyrow label{font-size:11px;color:var(--ash);display:flex;align-items:center;gap:6px;cursor:pointer;}
button.ai-go{width:100%;background:var(--gold);border:none;color:#141110;font-family:inherit;
  font-weight:800;font-size:15px;padding:14px;cursor:pointer;letter-spacing:.03em;}
button.ai-go:disabled{opacity:.6;cursor:wait;}
.ai-status{font-size:12px;color:var(--ash);margin-top:10px;text-align:center;min-height:18px;}
.ai-status.err{color:var(--red);}
.ai-result{margin-top:18px;border-top:1px solid var(--line);padding-top:18px;}
.ai-oneliner{font-size:16px;font-weight:800;line-height:1.7;color:var(--bone);}
.ai-h{font-size:11px;letter-spacing:.12em;color:var(--gold);font-weight:800;margin:18px 0 8px;}
.ai-trend{font-size:13px;color:var(--ash);line-height:1.9;padding-inline-start:14px;position:relative;margin-bottom:6px;}
.ai-trend::before{content:"◆";position:absolute;inset-inline-start:0;color:var(--gold);font-size:8px;top:7px;}
.ai-wgrid{display:flex;gap:8px;margin:10px 0;}
.ai-w{flex:1;background:var(--panel);border:1px solid var(--line);padding:10px;text-align:center;}
.ai-w .nm{font-size:10px;color:var(--ash);}
.ai-w .vals{font-family:'IBM Plex Mono',monospace;font-size:14px;margin-top:4px;direction:ltr;}
.ai-w .vals .new{color:var(--gold);font-weight:600;}
button.ai-apply{background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-family:inherit;font-weight:600;font-size:12px;padding:8px 14px;cursor:pointer;margin-top:6px;}
.ai-verdict{display:inline-block;padding:4px 12px;font-size:12px;font-weight:800;margin-inline-end:8px;}
.ai-body{font-size:13px;color:var(--ash);line-height:2;}
.ai-meta{font-size:10px;color:var(--ash);margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;direction:ltr;text-align:left;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ═══════════════════════════════ STATE ═══════════════════════════════
const OZ = 31.1035;
let S = {
  lang: "ar",
  spot: 4060, egp: 49.2, prem: 3,
  budget: 300000, calcamt: 50000,
  weights: {deesc:35, base:45, stag:20},
  signals: [1,2,1,1,0],
  stamp: {cls:"", txt:null},
  diag: "",
  goldSource: "",
  aiKey: (typeof localStorage!=="undefined" && localStorage.getItem("ghc_key")) || "",
  aiRemember: (typeof localStorage!=="undefined" && !!localStorage.getItem("ghc_key")),
  ai: {loading:false, error:null, data:null, at:null, applied:false},

const SCEN_META = [
  {key:"deesc", lo:5800, hi:6300, color:"#4E8F7B"},
  {key:"base",  lo:5000, hi:5400, color:"#C9A227"},
  {key:"stag",  lo:3600, hi:4000, color:"#B4482E"},
];
const SIGCOL = ["#4E8F7B","#C9A227","#B4482E"];

// ═══════════════════════════════ TEXT ═══════════════════════════════
const T = {
ar: {
  dir:"rtl", langBtn:"EN",
  eyebrow:"خاص · مباشر", title:"غرفة عمليات الذهب",
  inSpot:"أونصة الذهب $", inEgp:"دولار / جنيه", inPrem:"مصنعية %",
  ounce:"الأونصة", ounceU:"التحويل المباشر بدون مصنعية",
  g24:"جرام 24", g21:"جرام 21", g18:"جرام 18", gp:"الجنيه الذهب",
  inclU:"جنيه · شامل المصنعية", gpU:"جنيه · 8 جرام عيار 21",
  pull:"⟳ تحديث الأسعار مباشرة", pulling:"جاري التحديث…",
  stampInit:"بيتحدّث تلقائيًا مع الفتح",
  unreachable:"Feeds unreachable — عدّل يدويًا",
  expGramT:"إزاي بنحسب سعر الجرام؟",
  expGram:`سعر الذهب عالميًا بيتسعّر بالدولار للأونصة <span class="term">(31.1 جرام عيار 24)</span>.
    بناخد سعر الأونصة ÷ 31.1 × سعر الدولار بالجنيه = <b>جرام 24 بالجنيه</b>.
    عيار 21 = جرام 24 × 0.875، والجنيه الذهب = 8 جرام عيار 21.
    خانة <b>المصنعية</b> بتضيف فرق السوق المحلي — عدّلها حسب أسعار الصاغة الفعلية.
    استثمارك بالجنيه محكوم بعاملين: <b>سعر الذهب العالمي</b> و<b>سعر صرف الجنيه</b> — وده جوهر التحوّط.`,
  calcT:"حاسبة الشراء بالأعيرة",
  calcAmt:"المبلغ", calcCur:"جنيه — يجيبلك:",
  thK:"العيار", thP:"سعر الجرام", thQ:"الكمية",
  k24:"عيار 24 (سبائك)", k22:"عيار 22", k21:"عيار 21", k18:"عيار 18 (مشغولات)",
  gpRow:"جنيهات ذهب", change:"فكة",
  expKaratT:"إيه الفرق بين الأعيرة؟",
  expKarat:`العيار = نسبة الذهب الخالص. <b>24</b> = 99.9% (سبائك)، <b>22</b> = 91.7%، <b>21</b> = 87.5% (الأشهر في مصر)،
    <b>18</b> = 75% (مشغولات). سعر أي عيار = سعر جرام 24 × نسبته.
    للتحوّط: <b>سبائك 24</b> أو <b>جنيهات ذهب</b> — مصنعية أقل وبيع أسهل.
    عيار 18 مشغولات — مصنعيته بتتخسر عند البيع، مش أداة تحوّط.`,
  targetLbl:"السعر المستهدف المرجّح بالاحتمالات",
  deltaVs:"عن السعر الحالي",
  bandNote:"السعر الحالي خارج نطاقات السيناريوهات التلاتة.<br>السوق مختلف مع أوزانك — راجعها بالسحب تحت.",
  expWT:"يعني إيه \"مرجّح بالاحتمالات\"؟",
  expW:`بدل الرهان على سيناريو واحد، بنحسب متوسط أهداف السيناريوهات التلاتة، كل واحد <b>موزون باحتماله</b>.
    الرقم ده مش تنبؤ، ده <b>بوصلة</b>: لو السعر الحالي أقل منه بكتير، السوق شايف احتمالات مختلفة عنك —
    يا إما أنت شايف حاجة السوق مش شايفها، يا إما محتاج تعدّل أوزانك.`,
  scen:{
    deesc:{name:"التهدئة", sub:"De-escalation", thesis:"صمود اتفاق إيران + تحوّل الفيدرالي + عودة تدفقات الصناديق"},
    base:{name:"السيناريو الأساسي", sub:"Base Case", thesis:"شراء البنوك المركزية (~720 طن/سنة) في مواجهة الفايدة المرتفعة"},
    stag:{name:"فخ الركود التضخمي", sub:"Stagflation", thesis:"رفع فايدة وسط ضعف اقتصادي + ضغط دولاري + بيع اضطراري"},
  },
  expScT:"إزاي أستخدم السيناريوهات؟",
  expSc:`دي أوزان جلسة مايو 2026 (تقرير مجلس الذهب العالمي + إجماع البنوك).
    اسحب أي شريط والباقيين بيتعدّلوا تلقائيًا عشان المجموع يفضل 100%.
    لما السعر يقع خارج النطاقات التلاتة، دي إشارة إن الإطار محتاج مراجعة صريحة، مش تجاهل.`,
  dcaT:"خطة الدخول التدريجي · 40 / 35 / 25", budgetLbl:"الميزانية", cur:"جنيه",
  tranches:[
    {label:"الدفعة الأولى", window:"مايو–يونيو", note:"تم شراء 5 جنيهات ذهب — دخول موفق"},
    {label:"الدفعة الثانية", window:"يوليو–أغسطس", note:"النافذة مفتوحة دلوقتي"},
    {label:"الدفعة الثالثة", window:"سبتمبر–أكتوبر", note:"استنى اجتماع الفيدرالي في سبتمبر"},
  ],
  nowMark:"← دلوقتي",
  posLine:(v)=>`المركز الحالي: 5 جنيهات ذهب ≈ <b class="num">${v}</b> جنيه بأسعار النهارده`,
  expDcaT:"ليه الشراء على 3 دفعات مش مرة واحدة؟",
  expDca:`دي استراتيجية <span class="term">DCA — Dollar Cost Averaging</span>: توزيع الشراء بدل توقيت السوق.
    التقسيم <b>40 / 35 / 25</b>: أكبر دفعة بدري (التحوّط يبدأ يشتغل)، والباقي على نوافذ مربوطة باجتماعات الفيدرالي.
    القاعدة: الذهب <b>15–25% كحد أقصى</b> من إجمالي الثروة — تحوّط مش مقامرة.`,
  watchT:"لوحة المتابعة — اضغط للتبديل",
  monitors:["اتفاق إيران","الفيدرالي","الجنيه/الدولار","التضخم الأساسي","البنوك المركزية"],
  siglbl:["داعم","مراقبة","خطر"],
  expMonT:"إيه المتغيرات دي وليه؟",
  expMon:`<b>اتفاق إيران</b> — انهياره يرفع الذهب فورًا.
    <b>الفيدرالي</b> — رفع الفايدة يضغط، التيسير يدعم.
    <b>الجنيه</b> — ضعفه يكسّب ذهبك بالجنيه حتى لو العالمي ثابت.
    <b>Core PCE</b> — بوصلة الفيدرالي.
    <b>البنوك المركزية</b> — الأرضية الهيكلية تحت السعر.
    أخضر = داعم، أصفر = مراقبة، أحمر = خطر على الأطروحة.`,
  aiT:"المحلل الذكي",
  aiKeyPh:"Anthropic API key — sk-ant-…",
  aiRemember:"احفظ المفتاح على الجهاز ده",
  aiGo:"⚡ حلّل السوق بناءً على إطاري",
  aiGoing:"بيبحث في السوق ويحلل… (٢٠–٤٠ ثانية)",
  aiNeedKey:"محتاج API key الأول — نفس مفتاح Post Studio",
  aiErr:"فشل التحليل — ",
  aiTrendsH:"اللي حرّك السوق",
  aiWeightsH:"الأوزان المقترحة",
  aiApply:"طبّق الأوزان دي على السيناريوهات",
  aiApplied:"✓ اتطبقت",
  aiTrancheH:"قرار الدفعة الثانية",
  aiEgpH:"قراءة الجنيه",
  aiVerdicts:{deploy:"ادخل دلوقتي", partial:"دخول جزئي", wait:"استنى"},
  aiDisc:"تحليل آلي مبني على بحث لحظي — راجعه بعقلك قبل أي قرار.",
  expAiT:"إزاي المحلل ده شغال؟",
  expAi:`الزرار بيبعت حالة اللوحة كاملة — الأسعار الحية، أوزانك، السعر المرجّح، حالة الدفعات، ألوان المتابعة —
    لنموذج <span class="term">Claude</span> ومعاه صلاحية بحث في الإنترنت.
    بيدوّر على آخر تحركات الذهب والفيدرالي والجنيه، وبيرجعلك: الاتجاهات اللي بتحرك السعر،
    أوزان مقترحة للسيناريوهات (تقدر تطبقها بضغطة)، وقرار صريح للدفعة الثانية.
    <b>المفتاح بيتبعت من متصفحك لـ Anthropic مباشرة</b> — مش بيتخزن في أي سيرفر تاني.

const $ = id => document.getElementById(id);
const fmt = (n,d=0) => n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const readInputs = () => {
  ["spot","egp","prem","budget","calcamt"].forEach(k=>{
    const el = $(k); if(el) S[k] = parseFloat(el.value)||0;
  });
};

function setWeight(key, val){
  val = Math.min(96, Math.max(2, val));
  const others = SCEN_META.map(s=>s.key).filter(k=>k!==key);
  const rest = 100 - val;
  const sum = others.reduce((a,k)=>a+S.weights[k],0) || 1;
  const next = {[key]:val};
  let acc = 0;
  others.forEach((k,i)=>{
    const v = i===others.length-1 ? rest-acc : Math.round(S.weights[k]/sum*rest);
    next[k] = Math.max(1,v); acc += next[k];
  });
  S.weights = next;
  readInputs();
  renderAll();
}

function cycleSignal(i){
  S.signals[i] = (S.signals[i]+1)%3;
  readInputs();
  renderAll();
}

function toggleLang(){
  readInputs();
  S.lang = S.lang==="ar" ? "en" : "ar";
  renderAll();
}

function renderAIResult(t){
  const d = S.ai.data;
  const vColor = {deploy:"var(--green)", partial:"var(--gold)", wait:"var(--red)"};
  const names = {deesc:t.scen.deesc.name, base:t.scen.base.name, stag:t.scen.stag.name};
  const sw = d.suggested_weights || {};
  const hasW = sw.deesc!=null && sw.base!=null && sw.stag!=null;
  return `
  <div class="ai-result">
    <div class="ai-oneliner">${d.one_liner || ""}</div>

    <div class="ai-h">${t.aiTrendsH}</div>
    ${(d.trends||[]).map(x=>`<div class="ai-trend">${x}</div>`).join("")}

    ${hasW ? `
    <div class="ai-h">${t.aiWeightsH}</div>
    <div class="ai-wgrid">
      ${SCEN_META.map(s=>`
        <div class="ai-w">
          <div class="nm">${names[s.key]}</div>
          <div class="vals">${S.weights[s.key]}% → <span class="new">${sw[s.key]}%</span></div>
        </div>`).join("")}
    </div>
    <div class="ai-body">${d.weights_reasoning || ""}</div>
    <button class="ai-apply" onclick="applyAI()">${S.ai.applied ? t.aiApplied : t.aiApply}</button>
    ` : ""}

    ${d.tranche2 ? `
    <div class="ai-h">${t.aiTrancheH}</div>
    <div>
      <span class="ai-verdict" style="border:1px solid ${vColor[d.tranche2.verdict]||"var(--ash)"};color:${vColor[d.tranche2.verdict]||"var(--ash)"}">
        ${t.aiVerdicts[d.tranche2.verdict] || d.tranche2.verdict}
      </span>
    </div>
    <div class="ai-body" style="margin-top:8px;">${d.tranche2.reasoning || ""}</div>
    ` : ""}

    ${d.egp_read ? `
    <div class="ai-h">${t.aiEgpH}</div>
    <div class="ai-body">${d.egp_read}</div>
    ` : ""}

    <div class="ai-meta">${S.ai.at || ""} · claude-sonnet-4-6 + web search · ${t.aiDisc}</div>
  </div>`;
}

function applyAI(){
  const sw = S.ai.data?.suggested_weights;
  if(!sw) return;
  let a = Math.round(sw.deesc), b = Math.round(sw.base), c = Math.round(sw.stag);
  const sum = a+b+c;
  if(sum !== 100 && sum > 0){ c = 100 - a - b; } // normalize drift
  S.weights = {deesc:Math.max(1,a), base:Math.max(1,b), stag:Math.max(1,c)};
  S.ai.applied = true;
  readInputs();
  renderAll();
}

function syncKey(){
  const el = $("aikey"), keep = $("aikeep");
  if(!el) return;
  S.aiKey = el.value.trim();
  S.aiRemember = keep.checked;
  try{
    if(S.aiRemember && S.aiKey) localStorage.setItem("ghc_key", S.aiKey);
    else localStorage.removeItem("ghc_key");
  }catch(e){}
}

async function analyze(){
  syncKey();
  const t = T[S.lang];
  if(!S.aiKey){
    S.ai = {...S.ai, error: t.aiNeedKey.replace(t.aiErr,""), data:S.ai.data};
    S.ai.error = t.aiNeedKey;
    renderAll();
    return;
  }
  readInputs();
  S.ai = {loading:true, error:null, data:S.ai.data, at:S.ai.at, applied:false};
  renderAll();

  const weighted = SCEN_META.reduce((a,s)=>a + S.weights[s.key]/100*(s.lo+s.hi)/2, 0);
  const langName = S.lang==="ar" ? "Egyptian colloquial Arabic (مصري)" : "English";
  const sigTxt = ["supportive","watch","risk"];
  const monEn = ["Iran deal","Fed signals","EGP/USD","Core PCE","CB buying"];
  const watch = monEn.map((m,i)=>m+"="+sigTxt[S.signals[i]]).join(", ");

  const prompt = `You are a senior precious-metals strategist advising a Cairo-based CIO on his personal gold hedge (EGP-denominated savings, 6-12 month horizon).

HIS FRAMEWORK (May 2026, from WGC Q1 report + bank consensus):
- De-escalation: target $5,800-6,300 (Iran deal holds, Fed pivots)
- Base Case: target $5,000-5,400 (CB buying ~720t/yr vs elevated rates)
- Stagflation Trap: target $3,600-4,000 (Fed hikes into weakness)
- DCA plan 40/35/25: Tranche 1 deployed (5 Egyptian gold pounds, June, good entry). Tranche 2 window: Jul-Aug (open now). Tranche 3: Sep-Oct.
- Max allocation rule: 15-25% of total wealth.

LIVE COCKPIT STATE (today):
- XAU/USD spot: $${S.spot}
- USD/EGP: ${S.egp}
- His current scenario weights: De-escalation ${S.weights.deesc}%, Base ${S.weights.base}%, Stagflation ${S.weights.stag}%
- His probability-weighted target: $${Math.round(weighted)}
- His watchlist assessment: ${watch}

TASK: Web-search the latest (last 1-2 weeks) on: gold price drivers, Fed rate expectations, and EGP/USD (official vs offshore if findable). Maximum 4 searches. Then produce your analysis in ${langName}.

Respond with ONLY this JSON (no fences, no preamble). All string values in ${langName}:
{
 "one_liner": "single sharp sentence: the state of his hedge right now",
 "trends": ["3-4 items, each: what happened + direction of impact on gold"],
 "suggested_weights": {"deesc": int, "base": int, "stag": int},
 "weights_reasoning": "2-3 sentences: why these weights vs his current ones",
 "tranche2": {"verdict": "deploy" | "partial" | "wait", "reasoning": "2-3 sentences with an explicit trigger condition"},
 "egp_read": "2 sentences on the pound layer of his hedge"
}
Weights must sum to 100. Be direct and specific — he prefers sharp calls over hedged language.`;

  try{
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": S.aiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens: 4000,
        messages:[{role:"user", content: prompt}],
        tools:[{type:"web_search_20250305", name:"web_search"}],
      }),
    });
    const data = await r.json();
    if(!r.ok || data.error) throw new Error(data?.error?.message?.slice(0,120) || "HTTP "+r.status);

    const text = (data.content||[])
      .filter(b=>b.type==="text").map(b=>b.text).join("\n")
      .replace(/```json|```/g,"").trim();
    const start = text.indexOf("{"), end = text.lastIndexOf("}");
    if(start<0 || end<=start) throw new Error(data.stop_reason==="max_tokens" ? "truncated — retry" : "no JSON returned");
    const parsed = JSON.parse(text.slice(start, end+1));

    S.ai = {
      loading:false, error:null, data:parsed, applied:false,
      at: new Date().toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}),
    };
  }catch(e){
    S.ai = {...S.ai, loading:false, error:(e.message||"unknown").slice(0,120)};
  }
  renderAll();
}

      const j = await r.json(); return Number(j.price); } },
  { name:"jsdelivr-daily", fn: async () => {
      const r = await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json");
      const j = await r.json();
      const perUsd = Number(j?.usd?.xau);
      return perUsd ? 1/perUsd : 0; } },
];

async function fetchGold(){
  for (const feed of GOLD_FEEDS){
    try {
      const p = await withTimeout(feed.fn());
      if (p && p > 1000 && p < 20000){
        S.goldSource = feed.name;
        diagArr.push(feed.name+": OK ($"+Math.round(p)+")");
        return p;
      }
      diagArr.push(feed.name+": bad value");
    } catch(e){ diagArr.push(feed.name+": "+(e.message||"error")); }
  }
  throw new Error("all feeds failed");
}

async function fetchEGP(){
  try{
    const r = await withTimeout(fetch("https://open.er-api.com/v6/latest/USD"));
    const j = await r.json();
    const v = Number(j?.rates?.EGP);
    if(v && v>20 && v<200){ diagArr.push("er-api FX: OK ("+v.toFixed(2)+")"); return v; }
    throw new Error("bad value");
  }catch(e){
    diagArr.push("er-api FX: "+(e.message||"error"));
    const r2 = await withTimeout(fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json"));
    const j2 = await r2.json();
    const v2 = Number(j2?.usd?.egp);
    if(v2 && v2>20 && v2<200){ diagArr.push("jsdelivr FX: OK ("+v2.toFixed(2)+")"); return v2; }
    diagArr.push("jsdelivr FX: bad value");
    throw new Error("FX feeds failed");
  }
}

async function pullLive(){
  const t = T[S.lang];
  diagArr = [];
  readInputs();
  S.stamp = {cls:"", txt:"Contacting feeds…"};
  S.diag = "";
  renderAll();
  $("pullbtn").disabled = true;
  $("pullbtn").textContent = t.pulling;

  const [gRes, fxRes] = await Promise.allSettled([fetchGold(), fetchEGP()]);
  let fails = [];
  if(gRes.status==="fulfilled") S.spot = Math.round(gRes.value); else fails.push("gold");
  if(fxRes.status==="fulfilled") S.egp = Math.round(fxRes.value*100)/100; else fails.push("FX");

  if(fails.length===0){
    S.stamp = {cls:"ok", txt:"Live via "+S.goldSource+" · "+new Date().toLocaleString("en-GB",
      {day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})};
    S.diag = "";
  } else {
    S.stamp = {cls:"err", txt: fails.length===1 ? "Partial — "+fails[0]+" failed" : T[S.lang].unreachable};
    S.diag = diagArr.join("\n");
  }
  renderAll();
}

renderAll();
pullLive();
</script>
